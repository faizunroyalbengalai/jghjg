name: Deploy node to EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision EC2 with Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.server_ip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_region=us-east-1" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}"

      - name: Get server IP
        id: get_ip
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure EC2 and Deploy App
    runs-on: ubuntu-latest
    needs: provision
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH private key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Wait for SSH to become available
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Waiting for SSH on $SERVER_IP..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i /tmp/deploy_key ubuntu@$SERVER_IP echo "SSH ready" 2>/dev/null; then
              echo "SSH is available"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done
          echo "SSH did not become available in time"
          exit 1

      - name: Run Ansible playbook
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          ansible-playbook -i "$SERVER_IP," \
            -u ubuntu \
            --private-key /tmp/deploy_key \
            -e node_env_database_url='${{ secrets.DATABASE_URL }}' \
            -e node_env_mongo_uri='${{ secrets.MONGO_URI }}' \
            -e node_env_db_host='${{ secrets.DB_HOST }}' \
            -e node_env_db_port='${{ secrets.DB_PORT }}' \
            -e node_env_db_name='${{ secrets.DB_NAME }}' \
            -e node_env_db_user='${{ secrets.DB_USER }}' \
            -e node_env_db_password='${{ secrets.DB_PASSWORD }}' \
            -e install_db='${{ secrets.INSTALL_DB_ON_EC2 }}' \
            -e db_type='${{ secrets.DB_TYPE }}' \
            -e db_name='${{ secrets.DB_NAME }}' \
            -e db_username='${{ secrets.DB_USERNAME }}' \
            -e db_password='${{ secrets.DB_PASSWORD }}' \
            ansible/playbook.yml

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Verify application is running
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Verifying application at http://$SERVER_IP/health"
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://$SERVER_IP/health || true)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Application is healthy (HTTP $HTTP_CODE)"
              echo "Deployment successful: http://$SERVER_IP"
              exit 0
            fi
            echo "Attempt $i/12: HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          echo "Application did not respond with HTTP 200 in time"
          exit 1

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: always()
    steps:
      - name: Deployment success notification
        if: ${{ needs.verify.result == 'success' }}
        run: |
          echo "Deployment of node to EC2 succeeded."
          echo "Server IP: ${{ needs.provision.outputs.server_ip }}"
          echo "Application URL: http://${{ needs.provision.outputs.server_ip }}"

      - name: Deployment failure notification
        if: ${{ needs.verify.result != 'success' }}
        run: |
          echo "Deployment of node to EC2 FAILED."
          echo "Server IP: ${{ needs.provision.outputs.server_ip }}"
          exit 1