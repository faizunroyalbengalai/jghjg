---
- name: Deploy Node.js app on EC2
  hosts: all
  become: yes
  vars:
    app_dir: /opt/app
    app_user: ubuntu
    node_version: "20"

  tasks:

    - name: "Update apt cache"
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "Install required system packages"
      apt:
        name:
          - curl
          - git
          - nginx
          - build-essential
        state: present

    - name: "Install Node.js 20 via NodeSource"
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: "Install PM2 globally"
      npm:
        name: pm2
        global: yes
        state: present

    - name: "Create app directory"
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: "Copy application files to app directory"
      synchronize:
        src: ./
        dest: "{{ app_dir }}/"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=.env"

    - name: "Set ownership of app directory"
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    # ── Local DB install: PostgreSQL ──────────────────────────────────────────
    - name: "Install PostgreSQL"
      apt:
        name: postgresql
        state: present
      when: install_db | default('false') == 'true' and db_type | default('') == 'postgres'

    - name: "Fix PostgreSQL SCRAM auth to md5"
      shell: |
        HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
        sed -i 's/scram-sha-256/md5/g' "$HBA"
        systemctl reload postgresql
      when: install_db | default('false') == 'true' and db_type | default('') == 'postgres'

    - name: "Create PostgreSQL database"
      shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || \
        sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};"
      when: install_db | default('false') == 'true' and db_type | default('') == 'postgres'

    - name: "Create PostgreSQL user"
      shell: |
        sudo -u postgres psql -c "CREATE USER {{ db_username }} WITH ENCRYPTED PASSWORD '{{ db_password }}';" 2>/dev/null || true
      when: install_db | default('false') == 'true' and db_type | default('') == 'postgres'

    - name: "Grant PostgreSQL privileges"
      shell: |
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};"
      when: install_db | default('false') == 'true' and db_type | default('') == 'postgres'

    # ── Local DB install: MySQL ───────────────────────────────────────────────
    - name: "Install MySQL server"
      apt:
        name: mysql-server
        state: present
      when: install_db | default('false') == 'true' and db_type | default('') == 'mysql'

    - name: "Create MySQL database and user"
      shell: |
        mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
        mysql -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}';"
        mysql -e "GRANT ALL ON {{ db_name }}.* TO '{{ db_username }}'@'localhost';"
        mysql -e "FLUSH PRIVILEGES;"
      when: install_db | default('false') == 'true' and db_type | default('') == 'mysql'

    # ── Local DB install: MongoDB ─────────────────────────────────────────────
    - name: "Install MongoDB"
      apt:
        name: mongodb-org
        state: present
      when: install_db | default('false') == 'true' and db_type | default('') == 'mongodb'

    - name: "Start and enable MongoDB"
      systemd:
        name: mongod
        state: started
        enabled: yes
      when: install_db | default('false') == 'true' and db_type | default('') == 'mongodb'

    - name: "Initialize MongoDB database"
      shell: |
        mongosh --eval 'db.getSiblingDB("{{ db_name }}").createCollection("init")'
      when: install_db | default('false') == 'true' and db_type | default('') == 'mongodb'

    # ── Write .env file ───────────────────────────────────────────────────────
    - name: "Write .env file using shell"
      shell: |
        printf '' > {{ app_dir }}/.env
        [ -n "{{ node_env_database_url | default('') }}" ] && echo "DATABASE_URL={{ node_env_database_url }}" >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_mongo_uri | default('') }}" ]    && echo "MONGO_URI={{ node_env_mongo_uri }}"       >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_host | default('') }}" ]      && echo "DB_HOST={{ node_env_db_host }}"           >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_port | default('') }}" ]      && echo "DB_PORT={{ node_env_db_port }}"           >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_name | default('') }}" ]      && echo "DB_NAME={{ node_env_db_name }}"           >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_user | default('') }}" ]      && echo "DB_USER={{ node_env_db_user }}"           >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_password | default('') }}" ]  && echo "DB_PASSWORD={{ node_env_db_password }}"   >> {{ app_dir }}/.env || true
        echo "PORT=3000"        >> {{ app_dir }}/.env
        echo "HOST=0.0.0.0"     >> {{ app_dir }}/.env
      args:
        executable: /bin/bash

    - name: "Set .env file ownership"
      file:
        path: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"

    # ── npm install ───────────────────────────────────────────────────────────
    - name: "Run npm install"
      shell: |
        cd {{ app_dir }}
        npm install --production
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash

    - name: "Run npm build if build script exists"
      shell: |
        cd {{ app_dir }}
        if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)" 2>/dev/null; then
          npm run build
        fi
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash

    # ── Start app with PM2 ────────────────────────────────────────────────────
    - name: "Stop and delete existing PM2 app"
      shell: |
        pm2 delete app 2>/dev/null || true
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash

    - name: "Start app with PM2"
      shell: |
        set -a
        [ -f {{ app_dir }}/.env ] && . {{ app_dir }}/.env
        export PORT=${PORT:-3000}
        export HOST=${HOST:-0.0.0.0}
        set +a
        cd {{ app_dir }}
        if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.start ? 0 : 1)" 2>/dev/null; then
          pm2 start npm --name app -- start --update-env
        elif [ -f {{ app_dir }}/server.js ]; then
          pm2 start {{ app_dir }}/server.js --name app --update-env
        elif [ -f {{ app_dir }}/index.js ]; then
          pm2 start {{ app_dir }}/index.js --name app --update-env
        elif [ -f {{ app_dir }}/app.js ]; then
          pm2 start {{ app_dir }}/app.js --name app --update-env
        else
          echo "ERROR: No valid entrypoint found" && exit 1
        fi
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash

    - name: "Save PM2 process list"
      shell: pm2 save
      become_user: "{{ app_user }}"
      args:
        executable: /bin/bash

    - name: "Configure PM2 startup systemd service"
      shell: |
        env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu
      args:
        creates: /etc/systemd/system/pm2-ubuntu.service

    # ── Configure Nginx ───────────────────────────────────────────────────────
    - name: "Write Nginx site config"
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;

              location / {
                  proxy_pass         http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection 'upgrade';
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }

    - name: "Enable Nginx and restart"
      systemd:
        name: nginx
        state: restarted
        enabled: yes

    # ── Verify deployment ─────────────────────────────────────────────────────
    - name: "Wait for app to be available on port 3000"
      wait_for:
        host: 127.0.0.1
        port: 3000
        timeout: 120
        delay: 10
      ignore_errors: yes
      register: wait_result

    - name: "Dump PM2 logs on failure"
      shell: pm2 logs app --lines 100 --nostream
      become_user: "{{ app_user }}"
      when: wait_result is failed
      args:
        executable: /bin/bash

    - name: "Fail if app did not start"
      fail:
        msg: "Application failed to start on port 3000. Check PM2 logs above."
      when: wait_result is failed

    - name: "Print server IP"
      debug:
        msg: "server_ip={{ ansible_host }}"